<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيانة تكييفات مصر</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f8f8f8; direction: rtl; min-height: 100vh; display: flex; flex-direction: column; }

        /* Background Logo */
        .background-logo {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .background-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.08;
        }

        /* Logo Top Left */
        .logo-container {
            position: relative;
            z-index: 2;
            padding: 20px;
        }
        .logo-container img { height: 60px; }

        /* Cards Section */
        .cards-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            position: relative;
            padding: 20px;
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Force 2x2 grid */
            gap: 20px;
            justify-items: center;
            text-align: center;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 300px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .card:hover img {
            transform: scale(1.05); /* same hover animation */
        }

.card-text {
    position: absolute;
    bottom: 15px;
    right: 15px;
    color: white;
    font-size: 1.2rem;
    font-weight: bold;
    text-shadow: 0 2px 6px rgba(0,0,0,0.5);
    background-color: rgba(0,0,0,0.4); /* semi-transparent dark highlight */
    padding: 5px 10px;
    border-radius: 6px;
        }

        /* Mobile tweaks */
        @media(max-width: 600px){
            .cards-container {
                grid-template-columns: 1fr; /* single column on mobile */
                gap: 15px;
            }
            .card { height: 180px; }
            .card-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <!-- Full-Screen Background Logo -->
    <div class="background-logo">
        <img src="media/Logo.png" alt="Background Logo">
    </div>

    <!-- Logo Top Left -->
    <div class="logo-container">
        <img src="media/Logo.png" alt="Logo">
    </div>

    <!-- Cards Section -->
    <div class="cards-wrapper">
        <div class="cards-container">
            <a href="#" class="card">
                <img src="media/Repair.png" alt="طلب صيانة">
                <div class="card-text">طلب صيانة</div>
            </a>
            <a href="#" class="card">
                <img src="media/Team.jpg" alt="تعرف علينا">
                <div class="card-text">تعرف علينا</div>
            </a>
            <a href="#" class="card">
                <img src="media/Services.jpg" alt="خدماتنا">
                <div class="card-text">خدماتنا</div>
            </a>
            <a href="#" class="card">
                <img src="media/Blog.jpg" alt="المدونة">
                <div class="card-text">المدونة</div>
            </a>
        </div>
    </div>

</body>
</html>
