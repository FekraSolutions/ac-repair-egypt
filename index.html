<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيانة تكييفات مصر</title>
    <style>
        /* ----------------------------------------
           Reset & Basic Styles
        ---------------------------------------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f8f8f8;
            direction: rtl;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* ----------------------------------------
           Logo at Top Left
        ---------------------------------------- */
        .logo-container {
            padding: 20px;
        }

        .logo-container img {
            height: 60px;
        }

        /* ----------------------------------------
           Hero / Cards Section
        ---------------------------------------- */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 40px 20px;
            justify-items: center;
        }

        .card {
            position: relative;
            width: 100%;
            max-width: 300px;
            height: 200px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(50%);
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .card:hover img {
            filter: brightness(70%);
            transform: scale(1.05);
        }

        .card-text {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        @media(max-width: 600px){
            .cards-container {
                gap: 15px;
                padding: 20px 10px;
            }

            .card {
                height: 180px;
            }

            .card-text {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Logo Top Left -->
    <div class="logo-container">
        <img src="media/Logo.png" alt="Logo">
    </div>

    <!-- Cards Section -->
    <div class="cards-container">
        <a href="#" class="card">
            <img src="media/Logo.png" alt="طلب صيانة">
            <div class="card-text">طلب صيانة</div>
        </a>
        <a href="#" class="card">
            <img src="media/Team.jpg" alt="تعرف علينا">
            <div class="card-text">تعرف علينا</div>
        </a>
        <a href="#" class="card">
            <img src="media/Services.jpg" alt="خدماتنا">
            <div class="card-text">خدماتنا</div>
        </a>
        <a href="#" class="card">
            <img src="media/Blog.jpg" alt="المدونة">
            <div class="card-text">المدونة</div>
        </a>
    </div>

</body>
</html>
