<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
    <link rel="canonical" href="https://fekrasolutions.github.io/fixurion-egypt-appliance-fix/blogpages/acissueblog1.html" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<!-- SEO -->
<meta name="description" content="ما هي أسباب عدم تبريد التكييف الشائعة، وما هي الأسباب المحتملة، وما هي الاجراءات التي يمكنك تنفيذها بنفسك، ومتى تتصل بكولد لاين لحل المشكلة بكفاءة، وبسرعة">

<link rel="icon" type="image/png" href="../media/Logo.png">

<title>أسباب عدم تبريد التكييف: وصف العطل، الأسباب المحتملة، والحل!</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family:'Cairo',sans-serif; }
body { direction: rtl; background:#0a74da; color:white; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

.background-logo {
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    display:flex; justify-content:center; align-items:center;
    z-index:0; overflow:hidden;
}
.background-logo img {
    width:100%; height:100%; object-fit:cover; opacity:0.08;
}

.home-btn {
    position:absolute;
    top:20px; left:20px;
    font-size:1.7rem; text-decoration:none; z-index:2;
}

.blog-wrapper {
    position:relative;
    z-index:2;
    max-width:900px;
    margin:150px 20px 50px 20px;
    text-align:right;
}

.blog-wrapper h1 {
    font-size:2.2rem;
    margin-bottom:25px;
    text-align:center;
}

.blog-wrapper p {
    font-size:1.15rem;
    line-height:1.8;
    margin-bottom:20px;
}

.blog-wrapper img {
    max-width:100%;
    margin:20px 0;
    border-radius:10px;
}

/* Markdown content styling */
.article-section img {
    max-width:100%;
    border-radius:8px;
    margin:15px 0;
}

.article-section h2 {
    font-size:1.8rem;
    margin-top:30px;
    margin-bottom:15px;
}

.article-section h3 {
    font-size:1.5rem;
    margin-top:25px;
    margin-bottom:12px;
}

.article-section p {
    font-size:1.1rem;
    line-height:1.7;
    margin-bottom:20px;
}

/* Responsive */
@media(max-width:600px){
    .blog-wrapper { margin:120px 15px 30px 15px; }
    .blog-wrapper h1 { font-size:1.8rem; }
    .article-section h2 { font-size:1.5rem; }
    .article-section h3 { font-size:1.3rem; }
    .article-section p { font-size:1rem; }
}

/* Make all hyperlinks yellow and remove underline if needed */
a {
    color: #ffeb3b; /* أصفر */
}

a:hover {
    color: #ffd700; /* أصفر أفتح عند المرور بالفأرة، اختياري */
}
    
</style>
</head>
<body>

<!-- Washout Background Logo -->
<div class="background-logo">
    <img src="../media/Logo.png" alt="Background Logo">
</div>

<!-- Home Button -->
<a href="../index.html" class="home-btn">🏠</a>

<!-- Blog Content Wrapper -->
<div class="blog-wrapper">
    <h1>أسباب عدم تبريد التكييف: وصف العطل، الأسباب المحتملة، والحل!</h1>

    <section class="article-section">
        {% capture md_content %}
            {% include acissueblog1.md %}
        {% endcapture %}
        {{ md_content | markdownify }}
    </section>
</div>

</body>
</html>
